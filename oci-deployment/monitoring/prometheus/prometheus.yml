global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'oci-deployment'
    replica: '0'

scrape_configs:
  # Spring Boot Application (API)
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api:8080']
        labels:
          application: 'spring-api'
          environment: 'production'
    scrape_interval: 10s
    scrape_timeout: 5s

  # NGINX Frontend
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          application: 'nginx-frontend'
          environment: 'production'
    scrape_interval: 10s

  # PostgreSQL Database
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          application: 'postgres-db'
          environment: 'production'
    scrape_interval: 15s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'
