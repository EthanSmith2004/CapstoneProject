server {
    listen 80;
    server_name ${SERVER_NAME};
    
    # Serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Try to serve request as file, then as directory, then fall back to index.html
        # This is important for React Router (client-side routing)
        try_files $uri /index.html;
    }

    # Add this for Prometheus metrics
    location /stub_status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;  # Allow Docker networks
        allow 127.0.0.1;       # Allow localhost
        deny all;
    }
    
    # Proxy API requests to backend
    location /api/ {
        proxy_pass ${API_URL};
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
      # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}
