name: Deploy to Server

description: Copies the folder to the server and restarts the application.

inputs:
  path:
    description: Path to the folder to deploy
    required: true
  destination:
    description: Destination path on the server
    required: true
  ssh-key:
    description: SSH private key for authentication.
    required: true
  ssh-host:
    description: Hostname or IP address of the server.
    required: true

runs:
  using: "composite"
  steps:
    # Write SSH key to a temporary file
    - name: Write SSH key to file
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
      run: |
        echo "$SSH_KEY" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key

    # Clear destination path and copy directory to server
    - name: Clear and copy directory to server
      shell: bash
      run: |
        ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key root@${{ inputs.ssh-host }} << 'EOF'
          mkdir -p ${{ inputs.destination }}
          rm -rf ${{ inputs.destination }}/*
        EOF
        scp -r -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ inputs.path }}/* root@${{ inputs.ssh-host }}:${{ inputs.destination }}/

    # Clean up temporary SSH key file
    - name: Clean up SSH key file
      shell: bash
      run: |
        rm -f /tmp/ssh_key
