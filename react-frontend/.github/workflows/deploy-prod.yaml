name: Build and Deploy Prod 

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Install dependencies and build the project
    - name: Install dependencies
      run: |
        npm install
        npm run build

    # Call WireGuard setup
    - name: Set up WireGuard
      uses: ./.github/actions/wireguard
      with:
        WG_CONF: ${{ secrets.WG_CONF }}

    # Call deployment to server
    - name: Deploy to Dev
      uses: ./.github/actions/deploy-to-server
      with:
        ssh-key: ${{ secrets.DEV_SSH_KEY }}
        ssh-host: ${{ vars.SSH_HOST }}
        path: ${{ github.workspace }}/dist
        destination: /var/www/prod